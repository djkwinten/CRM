name = "djkwinten-bookingmanager-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
SMTP_HOST = "smtp.gmail.com"
SMTP_PORT = "587"
SMTP_USER = "djkwinten@gmail.com"
APP_URL = "https://thr-849231d5-djkwinten-crm.nxcode-io.workers.dev"

[triggers]
# Dagelijks om 08:15 UTC: stuur indien nodig de 1-maand-vragenlijst-herinnering.
crons = ["15 8 * * *"]

# D1/R2 bindings must be added after nxcode d1/r2 resource creation succeeds.

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "dj-booking-fotos"
